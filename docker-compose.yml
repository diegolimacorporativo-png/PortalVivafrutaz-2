version: '3.9'

services:
  app:
    build: .
    container_name: vivafrutaz_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    networks:
      - vivafrutaz_net

  db:
    image: postgres:15-alpine
    container_name: vivafrutaz_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-vivafrutaz}
      - POSTGRES_USER=${POSTGRES_USER:-vivafrutaz}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vivafrutaz}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vivafrutaz_net

volumes:
  pg_data:

networks:
  vivafrutaz_net:
    driver: bridge
